<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>튼튼 생활 수학 교실</title>
    <style>
        * { box-sizing: border-box; -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }
        body { font-family: 'Malgun Gothic', sans-serif; background-color: #f0f4f8; margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        h1 { color: #2c3e50; margin: 10px 0; font-size: 24px; font-weight: bold; text-align: center; }
        
        /* 대시보드 및 상단 정보 */
        .info-bar { display: flex; flex-direction: column; gap: 8px; width: 100%; max-width: 650px; background: #fff; padding: 15px 20px; border-radius: 15px; margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); font-size: 18px; font-weight: bold; }
        .info-top { display: flex; justify-content: space-between; width: 100%; }
        .hearts { color: #e53e3e; font-size: 20px; letter-spacing: 2px; }
        
        /* 🏃‍♂️ 무제한 달리기 순환 게이지바 디자인 */
        .progress-container { width: 100%; background-color: #edf2f7; height: 35px; border-radius: 20px; position: relative; margin-top: 5px; border: 2px solid #cbd5e0; overflow: visible; }
        .progress-bar { height: 100%; background: linear-gradient(90deg, #48bb78, #38a169); border-radius: 16px; width: 0%; transition: width 0.3s ease; }
        .runner { position: absolute; top: -8px; left: 0%; transform: translateX(-50%); font-size: 24px; transition: left 0.3s ease; z-index: 5; }
        .progress-text { position: absolute; right: 15px; top: 5px; font-size: 14px; color: #2d3748; font-weight: bold; z-index: 2; }

        /* 화면 섹션 제어 */
        .screen { display: none; width: 100%; max-width: 650px; background: white; padding: 25px; border-radius: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); text-align: center; }
        .screen.active { display: block; }
        
        /* 입력창 스타일 */
        input[type="text"], input[type="date"] { width: 80%; padding: 12px; font-size: 18px; margin: 10px 0; border: 2px solid #cbd5e0; border-radius: 10px; text-align: center; }
        .start-btn { width: 80%; padding: 15px; font-size: 20px; background-color: #3182ce; color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; margin-top: 15px; }
        
        /* 문제 화면 디자인 */
        .situation-box { background-color: #fffaf0; padding: 18px; border-radius: 15px; border: 2px dashed #dd6b20; margin-bottom: 20px; font-size: 19px; font-weight: bold; color: #dd6b20; line-height: 1.6; }
        .question { font-size: 21px; font-weight: bold; margin-bottom: 20px; color: #2d3748; }
        
        /* ⏰ 시계 모형 구현 구역 */
        .clock-container { display: flex; justify-content: center; align-items: center; margin: 20px 0; min-height: 220px; }
        .analog-clock { width: 200px; height: 200px; border: 8px solid #4a5568; border-radius: 50%; position: relative; background: white; box-shadow: inset 0 0 15px rgba(0,0,0,0.1), 3px 5px 10px rgba(0,0,0,0.15); }
        .analog-clock::after { content: ''; width: 12px; height: 12px; background: #e53e3e; border-radius: 50%; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 10; }
        .clock-number { position: absolute; font-size: 16px; font-weight: bold; color: #2d3748; width: 20px; height: 20px; text-align: center; line-height: 20px; }
        .n12 { top: 5px; left: 82px; } .n3 { top: 82px; right: 5px; } .n6 { bottom: 5px; left: 82px; } .n9 { top: 82px; left: 5px; }
        .n1 { top: 15px; left: 125px; } .n2 { top: 45px; left: 155px; } .n4 { top: 120px; left: 155px; } .n5 { top: 150px; left: 125px; }
        .n7 { bottom: 15px; left: 40px; } .n8 { bottom: 45px; left: 10px; } .n10 { top: 45px; left: 10px; } .n11 { top: 15px; left: 40px; }
        .hour-hand { width: 6px; height: 50px; background-color: #2d3748; position: absolute; bottom: 50%; left: calc(50% - 3px); transform-origin: bottom center; border-radius: 4px; }
        .minute-hand { width: 4px; height: 75px; background-color: #4a5568; position: absolute; bottom: 50%; left: calc(50% - 2px); transform-origin: bottom center; border-radius: 4px; }
        .digital-clock { background-color: #2d3748; color: #48bb78; padding: 15px 30px; border-radius: 12px; font-family: 'Courier New', monospace; font-size: 38px; font-weight: bold; border: 4px solid #cbd5e0; box-shadow: inset 0 0 10px rgba(0,0,0,0.5), 2px 4px 6px rgba(0,0,0,0.1); letter-spacing: 2px; }

        /* 화폐 표시 구역 */
        .money-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; margin: 15px 0; padding: 15px; background-color: #edf2f7; border-radius: 15px; min-height: 90px; align-items: center; }
        .money-item { display: inline-block; }
        .bill-1000 { width: 130px; height: 70px; background-color: #a3bffa; border: 2px solid #5a67d8; border-radius: 6px; position: relative; color: #2b3674; font-weight: bold; box-shadow: 2px 4px 5px rgba(0,0,0,0.1); }
        .bill-text { position: absolute; top: 4px; left: 6px; font-size: 13px; }
        .bill-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 16px; border: 1px dashed rgba(0,0,0,0.2); padding: 2px 6px; border-radius: 50%; }
        .coin-500 { width: 70px; height: 70px; background: linear-gradient(135deg, #e2e8f0 0%, #cbd5e0 100%); border: 3px solid #718096; border-radius: 50%; position: relative; color: #4a5568; font-weight: bold; display: flex; justify-content: center; align-items: center; box-shadow: 2px 3px 5px rgba(0,0,0,0.15); font-size: 17px; }
        .coin-100 { width: 60px; height: 60px; background: linear-gradient(135deg, #edf2f7 0%, #cbd5e0 100%); border: 3px solid #a0aec0; border-radius: 50%; position: relative; color: #4a5568; font-weight: bold; display: flex; justify-content: center; align-items: center; box-shadow: 2px 3px 5px rgba(0,0,0,0.12); font-size: 15px; }
        
        /* 버튼 및 피드백 */
        .options-grid { display: grid; grid-template-columns: 1fr; gap: 12px; margin: 20px 0; min-height: 50px; }
        @media (min-width: 480px) { .options-grid { grid-template-columns: 1fr 1fr; } }
        .option-btn { width: 100%; padding: 20px; font-size: 19px; font-weight: bold; border: 3px solid #e2e8f0; border-radius: 15px; background-color: #fff; cursor: pointer; color: #2d3748; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .option-btn:disabled { opacity: 0.6; cursor: not-allowed; }
        
        .feedback-box { display: none; background-color: #edf2f7; padding: 15px; border-radius: 12px; font-size: 18px; margin: 15px 0; line-height: 1.5; font-weight: bold; text-align: left; border-left: 5px solid #4a5568; }
        .feedback-box.correct-style { border-left-color: #38a169; background-color: #f0fff4; color: #276749; }
        .feedback-box.wrong-style { border-left-color: #e53e3e; background-color: #fff5f5; color: #9b2c2c; }
        
        .next-btn { width: 100%; padding: 16px; font-size: 20px; background-color: #48bb78; color: white; border: none; border-radius: 12px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        
        /* 기록실 */
        .note-item { text-align: left; background: #f7fafc; padding: 15px; border-radius: 12px; margin-bottom: 12px; border: 1px solid #e2e8f0; }
        .record-table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 16px; }
        .record-table th, .record-table td { padding: 10px; border: 1px solid #e2e8f0; text-align: center; }
        .record-table th { background-color: #edf2f7; }
    </style>
</head>
<body>

    <h1>⏰ 특수학급 재미있는 생활 수학 💰</h1>
    
    <div class="info-bar" id="info-bar" style="display: none;">
        <div class="info-top">
            <div id="user-display">학생: </div>
            <div class="hearts" id="heart-display">💖💖💖💖💖</div>
        </div>
        <div class="progress-container">
            <div class="progress-bar" id="progress-bar"></div>
            <div class="runner" id="runner">🏃‍♂️</div>
            <div class="progress-text" id="progress-text">진행 중: 0문제째</div>
        </div>
    </div>

    <div id="login-screen" class="screen active">
        <h2>공부를 시작하기 전에 작성해요</h2>
        <label>오늘 날짜</label><br>
        <input type="date" id="login-date"><br><br>
        <label>이름 (닉네임)</label><br>
        <input type="text" id="login-name" placeholder="이름을 입력하세요"><br>
        <button class="start-btn" onclick="startGame()">게임 시작하기 ➔</button>
        
        <div style="margin-top: 30px; text-align: left;">
            <h3>📊 우리 반 최고 기록실</h3>
            <table class="record-table">
                <thead>
                    <tr><th>날짜</th><th>이름</th><th>맞춘 문제</th></tr>
                </thead>
                <tbody id="record-tbody">
                    <tr><td colspan="3">아직 기록이 없습니다.</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <div id="game-screen" class="screen">
        <div class="situation-box" id="game-situation">상황 생성 중...</div>
        <div class="question" id="game-question">문제를 읽어보세요!</div>
        
        <div class="clock-container" id="clock-container-zone"></div>
        <div class="money-container" id="game-visual-zone" style="display:none;"></div>
        
        <div class="options-grid" id="game-options"></div>
        
        <div class="feedback-box" id="feedback-box"></div>
        <button class="next-btn" id="next-btn" style="display: none;" onclick="nextQuestion()">다음 문제로 가기 ➔</button>
    </div>

    <div id="result-screen" class="screen">
        <h2 style="color: #2b6cb0;">✏️ 오늘의 공부 끝! 오답노트</h2>
        <p id="final-score-text" style="font-size: 20px; font-weight: bold;"></p>
        
        <div id="wrong-notebook-zone" style="margin: 20px 0;"></div>
        
        <button class="start-btn" style="background-color: #4a5568;" onclick="goToLogin()">처음 화면으로 돌아가기</button>
    </div>

    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(isCorrect) {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            if (isCorrect) {
                osc.frequency.setValueAtTime(523.25, audioCtx.currentTime);
                osc.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                osc.start(); osc.stop(audioCtx.currentTime + 0.3);
            } else {
                osc.frequency.setValueAtTime(220.00, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                osc.start(); osc.stop(audioCtx.currentTime + 0.35);
            }
        }

        document.getElementById('login-date').valueAsDate = new Date();

        let userName = "", gameDate = "";
        let totalHearts = 5;
        let score = 0;
        let solvedCount = 0;      // 푼 문제 수 수집
        let currentQuestionObj = null;
        let wrongQuestionsList = []; 

        const items = [{n:"🍦 아이스크림", p:1400}, {n:"🥤 과일음료", p:2300}, {n:"🍿 팝콘 세트", p:6500}, {n:"✏️ 수첩과 필통", p:4200}, {n:"🍔 햄버거 세트", p:7500}];

        function loadRecords() {
            const records = JSON.parse(localStorage.getItem('math_game_records') || '[]');
            const tbody = document.getElementById('record-tbody');
            if(records.length === 0) {
                tbody.innerHTML = `<tr><td colspan="3">아직 기록이 없습니다.</td></tr>`;
                return;
            }
            tbody.innerHTML = records.map(r => `<tr><td>${r.date}</td><td>${r.name}</td><td>${r.score}개</td></tr>`).join('');
        }
        loadRecords();

        function startGame() {
            userName = document.getElementById('login-name').value.trim();
            gameDate = document.getElementById('login-date').value;
            if(!userName) { alert("이름을 입력해주세요!"); return; }
            
            totalHearts = 5;
            score = 0;
            solvedCount = 0;
            wrongQuestionsList = [];
            
            document.getElementById('user-display').innerText = `학생: ${userName}`;
            updateHearts();
            updateProgressBar();
            
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('info-bar').style.display = 'flex';
            document.getElementById('game-screen').style.display = 'block';
            
            makeQuestion();
        }

        function updateHearts() {
            let heartStr = "";
            for(let i=0; i<5; i++) {
                heartStr += (i < totalHearts) ? "💖" : "🖤";
            }
            document.getElementById('heart-display').innerText = heartStr;
        }

        // 🏃‍♂️ 무제한 전용 게이지 업데이트 함수 (10단위로 계속 순환 주행)
        function updateProgressBar() {
            // 10문제를 한 바퀴(세트)로 잡아 게이지 바를 표현
            let currentLoop = solvedCount % 10;
            if (solvedCount > 0 && currentLoop === 0) {
                currentLoop = 10; // 10, 20, 30일 때는 가득 찬 모션 유지
            }
            const percentage = (currentLoop / 10) * 100;
            
            document.getElementById('progress-bar').style.width = percentage + "%";
            document.getElementById('runner').style.left = percentage + "%";
            document.getElementById('progress-text').innerText = `진행 중: ${solvedCount}문제째`;
        }

        function createAnalogClockHTML(hour, minute) {
            const minuteAngle = minute * 6;
            const hourAngle = (hour % 12) * 30 + (minute * 0.5); 
            return `
                <div class="analog-clock">
                    <div class="clock-number n12">12</div><div class="clock-number n1">1</div>
                    <div class="clock-number n2">2</div><div class="clock-number n3">3</div>
                    <div class="clock-number n4">4</div><div class="clock-number n5">5</div>
                    <div class="clock-number n6">6</div><div class="clock-number n7">7</div>
                    <div class="clock-number n8">8</div><div class="clock-number n9">9</div>
                    <div class="clock-number n10">10</div><div class="clock-number n11">11</div>
                    <div class="hour-hand" style="transform: rotate(${hourAngle}deg);"></div>
                    <div class="minute-hand" style="transform: rotate(${minuteAngle}deg);"></div>
                </div>
            `;
        }

        function makeQuestion() {
            document.getElementById('feedback-box').style.display = 'none';
            document.getElementById('next-btn').style.display = 'none';
            
            const clockZone = document.getElementById('clock-container-zone');
            const visualZone = document.getElementById('game-visual-zone');
            
            clockZone.innerHTML = ''; clockZone.style.display = 'none';
            visualZone.innerHTML = ''; visualZone.style.display = 'none';

            const gameType = Math.floor(Math.random() * 4); 
            let situation = "", question = "", correctAnswer = "", explanation = "", options = [];

            if (gameType === 0) {
                const h = Math.floor(Math.random() * 11) + 1;
                const m = [0, 30][Math.floor(Math.random() * 2)];
                const displayMin = m === 0 ? "00" : "30";
                
                clockZone.style.display = 'flex';
                clockZone.innerHTML = `<div class="digital-clock">${h}:${displayMin}</div>`;
                situation = `📟 탁자 위에 전자 디지털시계가 켜져 있습니다.`;
                question = `화면에 나온 시계 모형을 보고 알맞은 시간을 고르세요.`;
                correctAnswer = `${h}시 ${m === 0 ? '정각' : '30분'}`;
                explanation = `💡 디지털 숫자에 [ ${h}:${displayMin} ]이라고 적혀있으므로 [${correctAnswer}]이 정답입니다!`;
                options = [correctAnswer, `${h === 12 ? 1 : h + 1}시 ${m === 0 ? '정각' : '30분'}`, `${h}시 05분`, `${h === 1 ? 12 : h - 1}시 정각`];
            } 
            else if (gameType === 1) {
                const h = Math.floor(Math.random() * 11) + 1;
                const m = [0, 30][Math.floor(Math.random() * 2)];
                
                clockZone.style.display = 'flex';
                clockZone.innerHTML = createAnalogClockHTML(h, m);
                situation = `⏰ 벽에 걸린 아날로그 바늘시계의 모습입니다.`;
                question = `시계 바늘이 가리키는 시간은 디지털 숫자로 몇 시 몇 분일까요?`;
                correctAnswer = `${h}시 ${m === 0 ? '00분' : '30분'}`;
                explanation = `💡 짧은 바늘과 긴 바늘의 위치를 눈으로 잘 파악하면 정답은 [${correctAnswer}]이 됩니다!`;
                options = [correctAnswer, `${h}시 ${m === 0 ? '30분' : '00분'}`, `${h === 12 ? 1 : h + 1}시 ${m === 0 ? '00분' : '30분'}`, `${h}시 06분`];
            }
            else if (gameType === 2) {
                const item = items[Math.floor(Math.random() * items.length)];
                const price = item.p;
                const neededThousand = Math.ceil(price / 1000);
                
                situation = `🛍️ 가게에서 ${price.toLocaleString()}원짜리 [${item.n}]을 사려고 합니다.`;
                question = "내 주머니에 1,000원짜리 지폐만 있다면, 부족하지 않게 '넉넉히' 얼마를 내야 할까요?";
                correctAnswer = `${(neededThousand*1000).toLocaleString()}원 (${neededThousand}장)`;
                explanation = `💡 물건 값이 ${price.toLocaleString()}원이므로, 1,000원짜리를 한 장 더 넉넉하게 [${correctAnswer}]을 내야 합니다.`;
                
                visualZone.style.display = 'block';
                visualZone.innerHTML = `<div style="font-size:22px; font-weight:bold; color:#2b6cb0; text-align:center;">💰 물건 가격표: ${price.toLocaleString()}원</div>`;
                options = [correctAnswer, `${((neededThousand-1)*1000).toLocaleString()}원 (${neededThousand-1}장)`, `${((neededThousand+1)*1000).toLocaleString()}원 (${neededThousand+1}장)`, "1,000원 (1장)"];
            }
            else {
                const th = Math.floor(Math.random() * 3) + 1; 
                const fv = Math.floor(Math.random() * 2);     
                const hd = Math.floor(Math.random() * 4);     
                let total = (th*1000) + (fv*500) + (hd*100);
                
                situation = "💵 바구니 속에 진짜 지폐와 동전들이 놓여있습니다.";
                question = "그림에 있는 돈을 모두 힘을 합쳐 더하면 숫자로 얼마일까요?";
                correctAnswer = `${total.toLocaleString()}원`;
                explanation = `💡 천원 지폐 ${th}장, 오백원 ${fv}개, 백원 ${hd}개를 모두 더하면 [${correctAnswer}]이 됩니다!`;
                
                visualZone.style.display = 'flex';
                visualZone.style.justifyContent = 'center'; visualZone.style.gap = '10px'; visualZone.style.margin = '15px 0';
                for(let i=0; i<th; i++) visualZone.innerHTML += `<div class="money-item bill-1000"><div class="bill-text">1000</div><div class="bill-center">천원</div></div>`;
                for(let i=0; i<fv; i++) visualZone.innerHTML += `<div class="money-item coin-500">500</div>`;
                for(let i=0; i<hd; i++) visualZone.innerHTML += `<div class="money-item coin-100">100</div>`;
                options = [correctAnswer, `${(total-500).toLocaleString()}원`, `${(total+1000).toLocaleString()}원`, `${(total-100).toLocaleString()}원`];
            }

            currentQuestionObj = { situation, question, correctAnswer, explanation };
            document.getElementById('game-situation').innerText = situation;
            document.getElementById('game-question').innerText = question;
            
            const shuffledOptions = options.sort(() => Math.random() - 0.5);
            const optGrid = document.getElementById('game-options');
            optGrid.innerHTML = '';
            
            shuffledOptions.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(opt, btn);
                optGrid.appendChild(btn);
            });
        }

        function checkAnswer(selectedOpt, clickedBtn) {
            document.querySelectorAll('.option-btn').forEach(b => b.disabled = true);
            const fdBox = document.getElementById('feedback-box');
            fdBox.style.display = 'block';
            
            solvedCount++; // 푼 문제 증가
            updateProgressBar();

            if (selectedOpt === currentQuestionObj.correctAnswer) {
                fdBox.className = "feedback-box correct-style";
                fdBox.innerHTML = `⭕ 정답이에요! 잘했습니다!<br><br>${currentQuestionObj.explanation}`;
                playSound(true);
                score++;
            } else {
                totalHearts--;
                updateHearts();
                fdBox.className = "feedback-box wrong-style";
                fdBox.innerHTML = `❌ 아쉬워요! 틀렸습니다.<br><br>${currentQuestionObj.explanation}`;
                playSound(false);
                
                wrongQuestionsList.push({
                    sit: currentQuestionObj.situation,
                    q: currentQuestionObj.question,
                    myAns: selectedOpt,
                    realAns: currentQuestionObj.correctAnswer,
                    exp: currentQuestionObj.explanation
                });
            }
            document.getElementById('next-btn').style.display = 'block';
        }

        function nextQuestion() {
            // 오직 하트를 다 잃었을 때만 게임이 중단됩니다. (무제한화 완료)
            if (totalHearts <= 0) {
                endGame();
            } else {
                makeQuestion();
            }
        }

        function endGame() {
            document.getElementById('game-screen').style.display = 'none';
            document.getElementById('info-bar').style.display = 'none';
            document.getElementById('result-screen').style.display = 'block';
            
            document.getElementById('final-score-text').innerText = `${userName} 학생은 오늘 총 [ ${solvedCount}문제 중 ${score}개 ]를 맞췄습니다!`;
            
            const notebookZone = document.getElementById('wrong-notebook-zone');
            if (wrongQuestionsList.length === 0) {
                notebookZone.innerHTML = `<div style="padding:20px; background:#f0fff4; border-radius:15px; color:#276749; font-weight:bold; font-size:18px;">✨ 와우! 오늘 틀린 문제가 하나도 없어요! 최고예요!</div>`;
            } else {
                let html = `<h3 style="text-align:left; color:#c53030;">📋 틀린 문제 다시 보기 (오답노트)</h3>`;
                wrongQuestionsList.forEach((item, idx) => {
                    html += `
                        <div class="note-item">
                            <strong style="color:#2b6cb0;">[문제 ${idx+1}]</strong> ${item.sit}<br>
                            <strong>질문:</strong> ${item.q}<br>
                            <span style="color:#e53e3e;">❌ 내가 고른 답: ${item.myAns}</span><br>
                            <span style="color:#38a169;">⭕ 진짜 정답: ${item.realAns}</span><br>
                            <div style="margin-top:8px; padding-top:8px; border-top:1px dashed #cbd5e0; color:#4a5568;">${item.exp}</div>
                        </div>
                    `;
                });
                notebookZone.innerHTML = html;
            }

            const records = JSON.parse(localStorage.getItem('math_game_records') || '[]');
            records.push({ date: gameDate, name: userName, score: score });
            records.sort((a, b) => b.score - a.score);
            localStorage.setItem('math_game_records', JSON.stringify(records.slice(0, 5)));
            loadRecords();
        }

        function goToLogin() {
            document.getElementById('result-screen').style.display = 'none';
            document.getElementById('login-screen').style.display = 'block';
            document.getElementById('login-name').value = '';
        }
    </script>
</body>
</html>
